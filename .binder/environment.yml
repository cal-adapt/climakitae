name: climakitae-binder
channels:
  - conda-forge
dependencies:
  - python=3.12
  
  # Core scientific computing
  - numpy
  - scipy
  - pandas
  - xarray
  - dask
  - dask-core
  - netcdf4
  
  # Geospatial
  - geopandas
  - shapely
  - pyproj
  - cartopy
  - fiona
  
  # Climate/data tools
  - cftime
  - h5netcdf
  - zarr
  
  # Intake ecosystem
  - intake
  - intake-esm
  - intake-geopandas
  - intake-xarray

  # Data access / cloud storage
  - s3fs
  - fsspec
  - boto3
  - botocore
  - aiobotocore
  - dask-gateway
  - dask-geopandas
  - numcodecs

  # Additional geospatial
  - rasterio
  - rioxarray
  - geopy

  # Climate analysis
  - xclim
  - xmip
  - statsmodels
  - timezonefinder
  - tqdm
  - psutil
  - pytz
  - pydantic
  - param

  # Visualization
  - matplotlib
  - seaborn
  - bokeh
  
  # Jupyter environment
  - jupyterlab
  - notebook
  - ipython
  - ipykernel
  - ipywidgets
  
  # Documentation tools
  - mkdocs
  - mkdocs-material
  - mkdocstrings-python
  - griffe
  - mike
  
  # Development & utilities
  - git
  - pip
  - requests
  
  # Testing
  - pytest
  - pytest-xdist
  
  # Code quality
  - black
  - isort
  - flake8

  # pip-only packages (not available or unreliable on conda-forge)
  - pip:
    - xsdba
    - icechunk>=1.1.15
    - iprogress>=0.4
    - fastparquet
