name: docs-mkdocs

on:
    workflow_dispatch:
    push:
        branches: [ main ]
        tags:
            - "v*"

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Fetch all history for mike

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install docs dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r docs/requirements-mkdocs.txt

            - name: Configure git (for mike push)
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Determine version
              id: version
              run: |
                  if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
                    VERSION=${GITHUB_REF#refs/tags/v}
                    IS_LATEST="true"
                  else
                    VERSION="dev"
                    IS_LATEST="false"
                  fi
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "is_latest=$IS_LATEST" >> $GITHUB_OUTPUT

            - name: Build and deploy with mike
              run: |
                  if [ "${{ steps.version.outputs.is_latest }}" == "true" ]; then
                    mike deploy ${{ steps.version.outputs.version }} latest --push --update-aliases
                  else
                    mike deploy dev --push
                  fi
