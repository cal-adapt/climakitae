site_name: climakitae
site_description: Modern documentation for climakitae, centered on new_core workflows.
site_url: https://cal-adapt.github.io/climakitae/
repo_url: https://github.com/cal-adapt/climakitae
repo_name: cal-adapt/climakitae
edit_uri: edit/main/docs-mkdocs/

docs_dir: docs-mkdocs
site_dir: site

# TEMPLATE.md is an authoring scaffold (not user docs); exclude from the build
# so its placeholder cross-refs do not trigger autorefs warnings.
exclude_docs: |
  new-core/processors/TEMPLATE.md

# Pages that build (so autorefs and direct URLs keep working) but are kept
# out of the sidebar to reduce visual noise. The ``*-detailed`` pages exist
# only to host the autodoc directive after the matching landing page was
# converted into a pointer; users should land on the parent page.
not_in_nav: |
  api/param-validation-detailed.md
  api/core-data-interface.md
  api/core-boundaries.md
  api/processors.md

copyright: Copyright 2026, Cal-Adapt Analytics Engine

theme:
  name: material
  logo: docs/_static/cae-map.png
  favicon: docs/_static/cae-map.png
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_docstring_description: true
            show_docstring_examples: true
            show_docstring_other_parameters: true
            docstring_style: numpy
            members_order: source
            merge_init_into_class: true
          import:
            - https://docs.python-requests.org/en/latest/objects.inv
            - https://xarray.pydata.org/en/stable/objects.inv
            - https://dask.readthedocs.io/en/latest/objects.inv
            - https://geopandas.org/objects.inv

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Get Started: getting-started.md
  - Notebook Gallery: notebook-gallery.md
  - ClimateData:
      - Overview: new-core/index.md
      - Core Concepts: new-core/concepts.md
      - How-To Guides: new-core/howto.md
      - Architecture & Internals: new-core/architecture.md
      - Processor Reference:
          - Overview: new-core/processors/index.md
          - TimeSlice: new-core/processors/time_slice.md
          - WarmingLevel: new-core/processors/warming_level.md
          - Clip: new-core/processors/clip.md
          - Export: new-core/processors/export.md
          - Concatenate: new-core/processors/concatenate.md
          - ConvertUnits: new-core/processors/convert_units.md
          - BiasAdjustToStation: new-core/processors/bias_adjust_model_to_station.md
          - MetricCalc: new-core/processors/metric_calc.md
          - FilterUnadjustedModels: new-core/processors/filter_unadjusted_models.md
          - DropLeapDays: new-core/processors/drop_leap_days.md
          - ConvertToLocalTime: new-core/processors/convert_to_local_time.md
          - UpdateAttributes: new-core/processors/update_attributes.md
      - API Reference:
          - User Interface:
              - Main Entrypoint: api/new-core.md
              - Dataset Factory: api/dataset-factory.md
              - Dataset Pipeline: api/dataset.md
          - Internals:
              - Parameter Validation: api/param-validation.md
              - Data Access: api/data-access.md
              - Processor Utilities: api/processor-utilities.md
          - User-Facing Modules:
              - Explore: api/explore.md
              - Tools: api/tools.md
              - Util: api/util.md
              - Derived Variables: api/derived-variables.md
  - Migration:
      - Legacy to ClimateData: migration/legacy-to-new-core.md
  - Legacy API:
      - Status and Roadmap: legacy/status.md
      - Reference: api/core.md
