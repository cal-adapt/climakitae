site_name: climakitae
site_description: Modern documentation for climakitae, centered on new_core workflows.
site_url: https://cal-adapt.github.io/climakitae/
repo_url: https://github.com/cal-adapt/climakitae
repo_name: cal-adapt/climakitae
edit_uri: edit/main/docs-mkdocs/

docs_dir: docs-mkdocs
site_dir: site

copyright: Copyright 2026, Cal-Adapt Analytics Engine

theme:
  name: material
  logo: docs/_static/cae-map.png
  favicon: docs/_static/cae-map.png
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - content.tabs.link
  # Version selector dropdown
  version_selector: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_docstring_description: true
            show_docstring_examples: true
            show_docstring_other_parameters: true
            docstring_style: numpy
            members_order: source
            merge_init_into_class: true
          import:
            - https://docs.python-requests.org/en/latest/objects.inv
            - https://xarray.pydata.org/en/stable/objects.inv
            - https://dask.readthedocs.io/en/latest/objects.inv
            - https://geopandas.org/objects.inv

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Home: index.md
  - Get Started: getting-started.md
  - New Core:
      - Overview: new-core/index.md
      - API Reference:
          - Main Entrypoint: api/new-core.md
          - Dataset Factory: api/dataset-factory.md
          - Dataset Pipeline: api/dataset.md
          - Data Processors: api/processors.md
          - Parameter Validation: api/param-validation.md
          - Data Access: api/data-access.md
  - Migration:
      - Legacy to New Core: migration/legacy-to-new-core.md
  - Legacy API:
      - Status and Roadmap: legacy/status.md
